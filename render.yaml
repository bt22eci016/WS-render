services:
  - type: web
    name: word-search
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python -m nltk.downloader words
    startCommand: python main.py
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: VIDEO_ID
        sync: false
      - key: MOCK_CHAT
        sync: false
